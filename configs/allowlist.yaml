version: 1.0.0
mode: allowlist-only

commands:
  - id: systemctl-restart-kubelet
    desc: Restart kubelet service
    cmd: "systemctl restart kubelet"

  - id: systemctl-restart-containerd
    desc: Restart containerd service
    cmd: "systemctl restart containerd"

  - id: systemctl-stop-kubelet
    desc: Stop kubelet service
    cmd: "systemctl stop kubelet"

  - id: systemctl-stop-containerd
    desc: Stop containerd service
    cmd: "systemctl stop containerd"

  - id: systemctl-start-kubelet
    desc: Start kubelet service
    cmd: "systemctl start kubelet"

  - id: systemctl-start-containerd
    desc: Start containerd service
    cmd: "systemctl start containerd"

  - id: systemctl-status-kubelet
    desc: Show kubelet service status
    cmd: "systemctl status kubelet"

  - id: systemctl-status-containerd
    desc: Show containerd service status
    cmd: "systemctl status containerd"

  - id: systemctl-enable-kubelet
    desc: Enable kubelet service
    cmd: "systemctl enable kubelet"

  - id: systemctl-enable-containerd
    desc: Enable containerd service
    cmd: "systemctl enable containerd"

  - id: systemctl-daemon-reload
    desc: Reload systemd daemon configuration
    cmd: "systemctl daemon-reload"

  - id: systemctl-status-firewalld
    desc: Show firewalld service status
    cmd: "systemctl status firewalld"

  - id: systemctl-enable-firewalld
    desc: Enable firewalld service
    cmd: "systemctl enable firewalld --now"

  - id: systemctl-disable-firewalld
    desc: Disable firewalld service
    cmd: "systemctl disable firewalld --now"

  - id: systemctl-restart-firewalld
    desc: Restart firewalld service
    cmd: "systemctl restart firewalld"

  - id: systemctl-start-firewalld
    desc: Start firewalld service
    cmd: "systemctl start firewalld"

  - id: systemctl-stop-firewalld
    desc: Stop firewalld service
    cmd: "systemctl stop firewalld"

  - id: systemctl-status-node-exporter
    desc: Show node_exporter service status
    cmd: "systemctl status node_exporter.service"

  - id: systemctl-enable-node-exporter
    desc: Enable node_exporter service
    cmd: "systemctl enable node_exporter.service --now"

  - id: systemctl-disable-node-exporter
    desc: Disable node_exporter service
    cmd: "systemctl disable node_exporter.service --now"

  - id: systemctl-restart-node-exporter
    desc: Restart node_exporter service
    cmd: "systemctl restart node_exporter.service"

  - id: systemctl-start-node-exporter
    desc: Start node_exporter service
    cmd: "systemctl start node_exporter.service"

  - id: systemctl-stop-node-exporter
    desc: Stop node_exporter service
    cmd: "systemctl stop node_exporter.service"

  - id: systemctl-list-swap-units
    desc: List swap units
    cmd: "systemctl list-units --type=swap --no-pager"

  - id: setup-oks-node
    desc: Run OKS node initial setup script (root managed)
    cmd: "/opt/cmdgate/scripts/setup-oks-node.sh"

  - id: dnf-install-kubelet
    desc: Install kubelet package
    cmd: "dnf install kubelet"

  - id: dnf-install-kubeadm
    desc: Install kubeadm package
    cmd: "dnf install kubeadm"

  - id: dnf-install-local-rpms
    desc: Install local RPM files
    cmd: "dnf install <rpmFiles:k8s-rpms>"

  - id: dnf-info-containerd
    desc: Show containerd package information
    cmd: "dnf info containerd"

  - id: dnf-repolist
    desc: List DNF repositories
    cmd: "dnf repolist"

  - id: kubeadm-version
    desc: Show kubeadm version
    cmd: "kubeadm version"

  - id: kubeadm-config-images-list
    desc: List kubeadm required images
    cmd: "kubeadm config images list"

  - id: kubeadm-config-images-pull
    desc: Pull kubeadm required images
    cmd: "kubeadm config images pull"

  - id: kubeadm-upgrade-plan
    desc: Show kubeadm upgrade plan
    cmd: "kubeadm upgrade plan"

  - id: kubeadm-upgrade-node
    desc: Upgrade kubeadm node
    cmd: "kubeadm upgrade node"

  - id: kubeadm-certs-check-expiration
    desc: Check kubeadm certificate expiration
    cmd: "kubeadm certs check-expiration"

  - id: etcdctl-endpoint-health
    desc: Check etcd endpoint health
    cmd: "etcdctl endpoint health"

  - id: etcdctl-member-list
    desc: List etcd members
    cmd: "etcdctl member list"

  - id: etcdctl-endpoint-status
    desc: Show etcd endpoint status
    cmd: "etcdctl endpoint status"

  - id: sysctl-system
    desc: Apply sysctl settings
    cmd: "sysctl --system"

  - id: swapoff-a
    desc: Disable swap
    cmd: "swapoff -a"

  - id: modprobe-br-netfilter
    desc: Load br_netfilter module
    cmd: "modprobe br_netfilter"

  - id: getenforce
    desc: Show SELinux status
    cmd: "getenforce"

  - id: setenforce-permissive
    desc: Set SELinux to permissive
    cmd: "setenforce 0"

  - id: crictl-info
    desc: Show CRI information
    cmd: "crictl info"

  - id: crictl-ps
    desc: List containers
    cmd: "crictl ps"

  - id: crictl-ps-all
    desc: List all containers
    cmd: "crictl ps -a"

  - id: crictl-images
    desc: List CRI images
    cmd: "crictl images"

  - id: crictl-logs
    desc: Show container logs
    cmd: "crictl logs <string:container>"

  - id: crictl-inspect
    desc: Inspect a container
    cmd: "crictl inspect <string:container>"

  - id: ctr-tasks-ls
    desc: List containerd tasks in k8s.io namespace
    cmd: "ctr -n k8s.io task list"

  - id: ctr-containers-info
    desc: Show containerd container info in k8s.io namespace
    cmd: "ctr -n k8s.io containers info <string:container>"

  - id: ctr-images-ls
    desc: List containerd images in k8s.io namespace
    cmd: "ctr -n k8s.io images ls"

  - id: ctr-containers-ls
    desc: List containerd containers in k8s.io namespace
    cmd: "ctr -n k8s.io containers ls"

  - id: journalctl-kubelet
    desc: Show kubelet logs
    cmd: "journalctl -u kubelet --no-pager"

  - id: journalctl-containerd
    desc: Show containerd logs
    cmd: "journalctl -u containerd --no-pager"

  - id: journalctl-kubelet-lines
    desc: Show kubelet logs with line count
    cmd: "journalctl -u kubelet -n <number:lines> --no-pager"

  - id: journalctl-containerd-lines
    desc: Show containerd logs with line count
    cmd: "journalctl -u containerd -n <number:lines> --no-pager"

matchers:
  k8s-rpms:
    type: rpmFiles
    multiple: true
    metadataNameIn:
      - kubelet
      - containerd
      - containerd.io
      - kubeadm
      - cri-tools
      - kubectl
      - kubernetes-cni

  lines:
    type: number

  container:
    type: string
